<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>To-Do List — João Pedro</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <main class="app">
    <header class="header">
      <h1>To-Do List</h1>
      <p>Organize suas tarefas — com salvamento automático.</p>
    </header>

    <section class="card">
      <form id="form" class="row">
        <input id="taskInput" type="text" placeholder="Digite uma tarefa…" autocomplete="off" />
        <button type="submit">Adicionar</button>
      </form>

      <div class="toolbar">
       <div class="counter">
  <span class="label">Total:</span>
  <span id="totalNum" class="num">0</span>
  <span class="label">• Concluídas:</span>
  <span id="doneNum" class="num">0</span>
</div>
        <button id="clearDone" type="button" class="ghost">Limpar concluídas</button>
      </div>

      <ul id="list" class="list"></ul>
    </section>

    <footer class="footer">
      <small>Feito por João Pedro • HTML/CSS/JS</small>
    </footer>
  </main>

  <script src="script.js"></script>
</body>
</html>
